trigger:    
- main    #branch

resources:  
- repo: self    #self repo

variables:
- group: CICD

parameters:
  - name: tag
    default: '$(Build.BuildId)' #identifier of build, # of build/version
  - name: imageName
    default: 'demo-page'

stages:
- stage: CICD
  displayName: CICD Workflow
  jobs:   #Executions
  - job: Build
    displayName: Build
    pool:  local-agent
    
    steps:
    - task: Docker@2  #like a Docker image v2
      displayName: Build an image
      inputs:
        repository: ${{ parameters.imageName}}  #taken from parameters
        command: build
        dockerfile: '**/Dockerfile' #double ** so it searches anywhere
        tags: ${{ parameters.tag}} #Taked form parameters
        arguments: '--build-arg VERSION=${{ parameters.tag }}'
        containerRegistry: registryConnection

    - task: Docker@2
      displayName: Push to ACR
      inputs:
        command: push
        containerRegistry: registryConnection
        repository: ${{ parameters.imageName}}
        tags: ${{ parameters.tag }}

  - job: Deploy
    displayName: Deploy
    dependsOn: Build
    pool: local-agent
    steps:
      - task: AzureContainerApps@1

        inputs:
          azureSubscription: 'appDeployConnection'
          imageToDeploy: acrappsvictorfallas.azurecr.io/${{ parameters.imageName }}:${{ parameters.tag }} #Parameters previuosly created

          containerAppName: 'app-demo-page' # NOMBRE DEL CONTAINER APP
          resourceGroup: 'RG-DevOps'

          acrUsername: $(acrUsername)   #from variables created in Azure DevOps
          acrPassword: $(acrPassword)   #from variables created in Azure DevOps
    
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storylabs Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gemini: linear-gradient(135deg, #00f2fe, #4facfe, #9b51e0, #f857a6);
        --bg-color: {{BG_COLOR}};
      }
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

      html,body{
        height:100%;
        font-family:'Plus Jakarta Sans',sans-serif;
        color:#f3f4f6;
        background-color: var(--bg-color, #030712);
        background-image: radial-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 24px 24px;
        overflow-x:hidden;
        position: relative;
      }

      /* Background Glow Effects */
      body::before, body::after, .glow-bg-3 {
        content:'';
        position:fixed;
        border-radius:50%;
        filter:blur(150px);
        z-index:-1;
        pointer-events:none;
      }

      body::before{
        top:-250px;left:-250px;
        width:700px;height:700px;
        background:radial-gradient(circle, rgba(59, 130, 246, 0.75) 0%, rgba(30, 58, 138, 0.3) 100%);
        animation: floatGlow1 25s infinite alternate ease-in-out;
      }

      body::after{
        bottom:-250px;right:-250px;
        width:700px;height:700px;
        background:radial-gradient(circle, rgba(236, 72, 153, 0.65) 0%, rgba(126, 34, 206, 0.25) 100%);
        animation: floatGlow2 20s infinite alternate ease-in-out;
      }

      .glow-bg-3 {
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(167, 139, 250, 0.4) 0%, rgba(139, 92, 246, 0.15) 100%);
        animation: floatGlow3 30s infinite ease-in-out;
      }

      @keyframes floatGlow1 {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(120px, 80px) scale(1.15); }
      }
      @keyframes floatGlow2 {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(-100px, -120px) scale(0.9); }
      }
      @keyframes floatGlow3 {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(-80px, 60px) scale(1.1); }
        66% { transform: translate(70px, -50px) scale(0.85); }
        100% { transform: translate(0, 0) scale(1); }
      }

      .container{
        max-width:1100px;
        margin:0 auto;
        padding:4rem 1.5rem;
        display:flex;
        flex-direction:column;
        gap:3.5rem;
        min-height: 100vh;
        justify-content: space-between;
      }

      header{text-align:center}

      .badge{
        display:inline-block;
        padding:.4rem 1.1rem;
        font-size:.75rem;
        font-weight:700;
        text-transform:uppercase;
        letter-spacing:.12em;
        background:rgba(255,255,255,.05);
        border:1px solid rgba(255,255,255,.15);
        color:#fff;
        border-radius:9999px;
        box-shadow: 0 0 20px rgba(255,255,255,0.05);
      }

      h1{
        margin:1.25rem 0 .6rem;
        font-family:'Outfit',sans-serif;
        font-size:clamp(2.5rem, 6vw, 4rem);
        font-weight:800;
        background: var(--gemini);
        background-size: 200% auto;
        -webkit-background-clip:text;background-clip:text;
        -webkit-text-fill-color:transparent;
        letter-spacing:-.03em;
        line-height:1.15;
        text-shadow: 0 0 50px rgba(79, 172, 254, 0.25);
        animation: gradientShift 8s ease infinite;
      }

      .subtitle{
        font-size:1.15rem;
        color:#9ca3af;
        max-width:620px;
        margin:0 auto;
        line-height:1.6;
      }

      .container-id-banner {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.85rem 1.75rem;
        background: rgba(13, 16, 27, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        max-width: 480px;
        width: 100%;
        margin: 0 auto;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                    0 0 20px rgba(0, 242, 254, 0.1);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .container-id-banner:hover {
        border-color: rgba(0, 242, 254, 0.3);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                    0 0 25px rgba(0, 242, 254, 0.25);
        transform: translateY(-2px);
      }

      .banner-label {
        font-size: 0.8rem;
        font-weight: 700;
        color: #9ca3af;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .banner-value {
        font-family: 'Outfit', sans-serif;
        font-size: 1.05rem;
        font-weight: 800;
        background: linear-gradient(135deg, #00f2fe, #4facfe);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 0.02em;
        text-shadow: 0 0 15px rgba(0, 242, 254, 0.25);
      }

      .grid{
        display:grid;
        gap:2rem;
        grid-template-columns:1fr;
        margin: 1rem 0;
      }
      @media(min-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}

      .card{
        position:relative;
        background:rgba(10, 11, 22, 0.55);
        border:1px solid rgba(255,255,255,.08);
        border-radius:24px;
        backdrop-filter:blur(16px);
        -webkit-backdrop-filter:blur(16px);
        padding:2.25rem 2rem;
        overflow:hidden;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .card::before{
        content:'';
        position:absolute;
        top:0;left:0;right:0;
        height:4px;
        background:var(--acc);
      }

      .card:hover{
        transform:translateY(-6px) scale(1.01);
        border-color:rgba(255,255,255,.18);
        box-shadow:0 12px 40px rgba(0,0,0,.6), 0 0 25px rgba(var(--tgb), 0.35);
      }

      .card h3{
        margin:1rem 0 .5rem;
        font-family:'Outfit',sans-serif;
        font-size:1.35rem;
        font-weight:700;
        color:#fff;
        letter-spacing:-.02em;
      }

      .card p{
        color:#9ca3af;
        line-height:1.6;
        font-size: 0.95rem;
      }

      .tag{
        display:inline-block;
        padding:.25rem .75rem;
        font-size:.7rem;
        font-weight:700;
        text-transform:uppercase;
        letter-spacing:.08em;
        background:rgba(var(--tgb),.15);
        border:1px solid rgba(var(--tgb),.3);
        color:rgb(var(--tgb));
        border-radius:9999px;
        box-shadow: 0 0 12px rgba(var(--tgb),0.15);
      }

      .cta-card{
        text-align:center;
        grid-column:1/2;
        padding:3rem 2rem;
        background: linear-gradient(180deg, rgba(15, 11, 28, 0.55) 0%, rgba(8, 5, 18, 0.75) 100%);
        border: 1px solid rgba(167, 139, 250, 0.2);
      }
      @media(min-width:900px){.cta-card{grid-column:1/3}}

      .cta-card .cta-title{
        font-size:1.6rem;
        margin-bottom: 0.5rem;
      }

      .cta-card .cta-desc{
        margin:.5rem 0 1.75rem;
        color:#9ca3af;
        font-size: 1.05rem;
      }

      .btn{
        display:inline-block;
        padding:.8rem 2.2rem;
        font-size:.95rem;
        font-weight:700;
        color:#fff;
        background: var(--gemini);
        background-size: 200% 200%;
        border:none;
        border-radius:9999px;
        cursor:pointer;
        box-shadow: 0 4px 20px rgba(79, 172, 254, 0.35);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        animation: gradientShift 6s ease infinite;
      }

      .btn:hover{
        transform: scale(1.04) translateY(-2px);
        box-shadow: 0 6px 25px rgba(248, 87, 166, 0.45), 0 0 30px rgba(79, 172, 254, 0.4);
      }

      .btn:active{
        transform: scale(0.98) translateY(0);
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      footer{
        text-align:center;
        font-size:.85rem;
        color:#4b5563;
        margin-top: 2rem;
        letter-spacing: 0.02em;
      }

      /* Native Dialog Modal Styling */
      dialog.modal-dialog {
        position: relative;
        border: none;
        background: transparent;
        padding: 0;
        margin: auto;
        overflow: visible;
        outline: none;
      }

      dialog.modal-dialog::backdrop {
        background: rgba(3, 7, 18, 0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      /* Animation for opening dialog */
      dialog.modal-dialog[open] {
        animation: zoomIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes zoomIn {
        from { transform: scale(0.92); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      @keyframes aurora {
        0%, 100% {
          background-position: 50% 50%;
          filter: blur(80px) hue-rotate(0deg) brightness(0.85);
        }
        33% {
          background-position: 48% 52%;
          filter: blur(90px) hue-rotate(120deg) brightness(1.1);
        }
        66% {
          background-position: 52% 48%;
          filter: blur(75px) hue-rotate(240deg) brightness(0.95);
        }
      }

      .modal-box{
        position: relative;
        background: rgba(13, 16, 27, 0.92);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: none;
        border-radius: 28px;
        padding: 2.5rem 3rem;
        max-width: 400px;
        width: 90vw;
        text-align: center;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.65);
        z-index: 1;
      }

      /* Big multi-color gradient blur behind the card (no sharp halo outline) */
      .modal-glow {
        content: '';
        position: absolute;
        inset: -60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #00f2fe, #4facfe, #9b51e0, #f857a6);
        z-index: 0;
        pointer-events: none;
        opacity: 0.65;
        filter: blur(80px);

        /* Aurora Borealis wavy shift animation */
        animation: aurora 12s infinite ease-in-out;
      }
      .modal-box h2{
        font-family:'Outfit',sans-serif;
        font-size:1.4rem;
        margin-bottom:.5rem;
        color:#fff;
      }

      .modal-box .ver{
        font-size:1.8rem;
        font-weight:800;
        margin:1.25rem 0 1.75rem;
        background:var(--gemini);
        background-size: 200% auto;
        -webkit-background-clip:text;background-clip:text;
        -webkit-text-fill-color:transparent;
        text-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        animation: gradientShift 6s ease infinite;
      }

      .modal-box .btn{
        font-size:.9rem;
        padding:.6rem 1.8rem;
      }
    </style>
  </head>
  <body>
    <!-- Ambient glows in the background -->
    <div class="glow-bg-3" aria-hidden="true"></div>

    <div class="container">
      <header>
        <span class="badge">DEMO</span>
        <h1>PÁGINA DE PRUEBAS</h1>
        <p class="subtitle">Pruebas de contenedores y CICD.</p>
      </header>

      <div class="container-id-banner">
        <span class="banner-label">CONTAINER ID:</span>
        <span class="banner-value">{{CONTAINER_ID}}</span>
      </div>

      <main class="grid">
        <article
          class="card cta-card"
          style="
            --acc: linear-gradient(135deg, #a78bfa, #8b5cf6);
            --glw: #a78bfa;
            --tgb: 167, 139, 250;
          "
        >
          <span class="tag">Demo</span>
          <h3 class="cta-title">Contenedores y CICD</h3>
          <p class="cta-desc">Comprueba la versión del servidor.</p>
          <button class="btn" id="versionBtn">Ver versión</button>
        </article>
      </main>

      <footer>&copy; 2026 Storylabs</footer>
    </div>

    <!-- Native HTML5 Dialog element with light-dismiss enabled via closedby="any" -->
    <dialog
      id="versionModal"
      class="modal-dialog"
      closedby="any"
      aria-labelledby="modalTitle"
    >
      <div class="modal-glow"></div>
      <div class="modal-box">
        <h2 id="modalTitle">Versión del Servidor</h2>
        <p class="ver" id="modalVersion">Cargando...</p>
        <button class="btn" id="closeModal">Cerrar</button>
      </div>
    </dialog>

    <script>
      const versionBtn = document.getElementById("versionBtn");
      const modal = document.getElementById("versionModal");
      const closeBtn = document.getElementById("closeModal");
      const verEl = document.getElementById("modalVersion");

      versionBtn.addEventListener("click", async () => {
        try {
          const res = await fetch("/api/version");
          const data = await res.json();
          verEl.textContent = `v${data.version}`;
        } catch {
          verEl.textContent = "Error al obtener versión";
        }
        modal.showModal();
      });

      closeBtn.addEventListener("click", () => modal.close());

      // Fallback for browsers without closedby support
      if (!("closedBy" in HTMLDialogElement.prototype)) {
        modal.addEventListener("click", (event) => {
          // When clicking the backdrop, the event target is the dialog element itself.
          if (event.target !== modal) return;

          // Check if the click coordinates fall within the dialog content boundaries
          const rect = modal.getBoundingClientRect();
          const isDialogContent =
            rect.top <= event.clientY &&
            event.clientY <= rect.top + rect.height &&
            rect.left <= event.clientX &&
            event.clientX <= rect.left + rect.width;

          if (!isDialogContent) {
            modal.close();
          }
        });
      }
    </script>
  </body>
</html>
